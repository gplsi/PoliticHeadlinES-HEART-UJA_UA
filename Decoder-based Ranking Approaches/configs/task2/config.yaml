# =============================================================================
# Task 2 — Multimodal ranking configuration (base template)
# =============================================================================
# This YAML drives the generative few-shot headline ranking pipeline for
# PoliticHeadlinES 2026 (IberLEF) Task 2, which uses BOTH article text and
# the associated image to rank candidate headlines.
#
# Key differences from Task 1:
#   - task_2.enabled = true, task_2.use_images = true
#   - The system prompt instructs the model to reason over visual content.
#   - The user template includes an image placeholder.
#
# Quick-start:
#   python generate_rankings.py --config configs/task2/config.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# API settings
# -----------------------------------------------------------------------------
# Any OpenAI-compatible endpoint can be used (vLLM, TGI, Together, etc.).
# The model field can be overridden per-task below if needed.
# -----------------------------------------------------------------------------
api:
  base_url: "https://api.openai.com/v1"
  api_key: null
  model: "your-chat-model-name"
  timeout_seconds: 120
  enable_thinking: false

# -----------------------------------------------------------------------------
# Inference hyperparameters
# -----------------------------------------------------------------------------
# Deterministic decoding (temperature=0) is used for reproducibility.
# max_tokens=4096 matches the value reported in the paper (Table 6).
# seed=42 fixes the global random state used for any stochastic operations.
# -----------------------------------------------------------------------------
inference:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 4096
  sleep_seconds: 0.1
  max_retries: 3
  retry_backoff_seconds: 2.0
  seed: 42

# -----------------------------------------------------------------------------
# Data paths
# -----------------------------------------------------------------------------
# training_csvs: merged to build the pool of few-shot demonstrations.
#   - dev_public.csv          → development labels
#   - train_public.csv        → main training split
#   - test_public/train_public.csv  → extra training data released with test set
#
# input_csv: the articles to rank (test_public.csv for the final submission).
# images_dir: directory containing article images (hash-named files).
# -----------------------------------------------------------------------------
data:
  training_csvs:
    - "data/development_phase_dataset/dev_public.csv"
    - "data/development_phase_dataset/train_public.csv"
    - "data/test_public/train_public.csv"

  input_csv: "data/test_public/test_public.csv"
  images_dir: "data/images"
  output_csv: "results/results_{model_slug}_final_task2.csv"
  output_zip: "results/results_{model_slug}_final_task2.zip"
  max_rows: null

# -----------------------------------------------------------------------------
# Task switches
# -----------------------------------------------------------------------------
# Task 2 is enabled and configured to use images for multimodal ranking.
# Task 1 is disabled so only the multimodal path runs.
# -----------------------------------------------------------------------------
task_1:
  enabled: false
  model: null

task_2:
  enabled: true
  use_images: true
  model: null

# -----------------------------------------------------------------------------
# Few-shot example selection
# -----------------------------------------------------------------------------
# Similarity metric used to retrieve training examples for each test article.
# Supported: "tfidf" | "semantic" | "hybrid_rrf"
#
# num_examples:    how many demonstrations to inject into the prompt (paper: 3).
# min_similarity:  minimum similarity threshold; examples below are discarded.
# semantic.cache_embeddings: persist embeddings to avoid recomputation.
# -----------------------------------------------------------------------------
fewshot_selection:
  enabled: true
  num_examples: 3
  similarity_metric: "tfidf"

  semantic:
    base_url: "https://api.openai.com/v1"
    api_key: null
    model: "your-embedding-model-name"
    cache_embeddings: true
    cache_path: ".embeddings_cache.pkl"
    max_retries: 3
    retry_backoff_seconds: 2.0

  rrf:
    k: 60
    tfidf_weight: 1.0
    semantic_weight: 1.0

  min_similarity: 0.2

# -----------------------------------------------------------------------------
# Prompt templates (Spanish — shared task language)
# -----------------------------------------------------------------------------
# system:      high-level instructions and multimodal ranking criteria.
#              Includes explicit visual-reasoning steps.
# user_template: per-article prompt with {article}, image placeholder,
#                and {title_1}..{title_10} placeholders.
# -----------------------------------------------------------------------------
prompt:
  system: |
    Eres un editor experto en política española y en verificación de titulares.

    Tu tarea es ordenar 10 titulares candidatos del más relevante al menos relevante para un artículo periodístico, usando tanto el texto del artículo como la imagen asociada.

    Criterios de ranking, en este orden:
    1. Fidelidad: el titular debe reflejar con precisión lo que dice el artículo.
    2. Especificidad: prioriza el titular que recoge mejor los hechos, actores, acciones y contexto concretos.
    3. Coherencia semántica: el titular debe encajar con el tema central, no solo con palabras sueltas.
    4. Penalización de errores: baja en el ranking titulares que:
       - Nombren a una persona, partido o institución diferente a la del artículo.
       - Atribuyan una acción que el artículo no menciona explícitamente.
       - Usen lenguaje valorativo ("escándalo", "fracaso", "polémica") sin respaldo textual directo.
       - Capturen solo el tema general pero omitan el hecho concreto relatado.
    5. Coherencia visual: analiza la imagen antes de evaluar los titulares. Si muestra personas, lugares, actos o símbolos concretos, prioriza titulares que sean coherentes con ese contenido visual. Penaliza titulares que contradigan o ignoren información visual relevante.

    Reglas de salida:
    - Devuelve solo una secuencia de 10 tokens separados por espacios.
    - Usa cada token t1, t2, ..., t10 exactamente una vez.
    - El primer token debe ser el titular más relevante y el último el menos relevante.
    - No devuelvas explicaciones, signos de puntuación, texto adicional ni saltos de línea.

    Ejemplo de salida válida:
    t3 t1 t9 t4 t2 t10 t8 t7 t6 t5

  user_template: |
    ### ARTÍCULO ###
    {article}

    ### IMAGEN ###
    [La imagen asociada al artículo se adjunta a continuación]

    ### TITULARES CANDIDATOS ###
    IMPORTANTE: El orden de aparición NO indica relevancia. Evalúa cada titular de forma independiente.

    t1: {title_1}
    t2: {title_2}
    t3: {title_3}
    t4: {title_4}
    t5: {title_5}
    t6: {title_6}
    t7: {title_7}
    t8: {title_8}
    t9: {title_9}
    t10: {title_10}

    Ordena los titulares del más relevante al menos relevante combinando la información del texto y de la imagen.

    Recuerda:
    - Prioriza el titular más fiel y específico al contenido real del artículo.
    - Usa la imagen como señal adicional: si aporta contexto concreto, úsalo para desambiguar entre candidatos similares.
    - Penaliza titulares incompletos, engañosos, sensacionalistas o que atribuyan hechos no mencionados.
    - Devuelve solo los tokens t1..t10 en orden, una sola vez cada uno, en una única línea.

# -----------------------------------------------------------------------------
# Debug options
# -----------------------------------------------------------------------------
debug:
  print_model_output: false
  print_model_output_rows: 0

# -----------------------------------------------------------------------------
# Evaluation (optional)
# -----------------------------------------------------------------------------
# When enabled, computes PA-nDCG with the hard top-1 condition against a
# reference CSV that contains a y_true column.
# -----------------------------------------------------------------------------
evaluation:
  enabled: false
  reference_csv: "data/dev_public.csv"
  k: 10
  alpha: 0.9
  save_json: true
  output_json: "results/metrics_{model_slug}_task2.json"
